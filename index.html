<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyep's Archive</title>
    <style>
        body { background-color: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; overflow: hidden; }
        
        /* 이미지 스타일 (클래스명은 유지해도 작동에 문제없습니다) */
        .love-letter { 
            width: 300px; 
            max-width: 80%; 
            transition: 0.3s; 
            animation: heartbeat 2s ease-in-out infinite; 
            cursor: pointer;
        }
        
        /* 마우스 올렸을 때 효과 */
        .love-letter:hover { transform: scale(1.05); animation-play-state: paused; }

        /* 두근거리는 애니메이션 */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); } 
            100% { transform: scale(1); }
        }

        /* 안내 문구 스타일 */
        p { margin-top: 30px; color: #aaa; font-size: 14px; letter-spacing: 2px; animation: fade 2s ease-in-out infinite; }
        
        @keyframes fade {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <a href="main.html">
        <img src="foot.png" alt="Enter" class="love-letter">
    </a>
    <p>💌Click to enter</p>
</body>
</html>
